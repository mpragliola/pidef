<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pidef</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toolbar">
    <div id="toolbar-left">
      <button id="btn-close" title="Close PDF">✕</button>
      <button id="btn-open">Open PDF</button>
    </div>
    <span id="page-label"></span>
    <div id="toolbar-right">
      <button id="btn-rotate" title="Rotate 90° clockwise">↻</button>
      <button id="btn-fullscreen" title="Fullscreen  F11">⛶</button>
    </div>
  </div>

  <svg style="display: none;">
    <filter id="sharpen-filter">
      <feConvolveMatrix kernelMatrix="0 -0.5 0 -0.5 3 -0.5 0 -0.5 0" divisor="1" />
    </filter>
  </svg>

  <div id="canvas-container">
    <canvas id="pdf-canvas"></canvas>
    <div id="brightness-hud">
      <div id="brightness-fill"></div>
    </div>
    <div id="welcome-screen">
      <div id="welcome-hint">Open a PDF to start reading</div>
      <div id="recent-files-section">
        <div id="recent-files-label">Recent Files</div>
        <ul id="recent-files-list"></ul>
      </div>
    </div>
  </div>

  <div id="bookmark-bar" class="hidden">
    <div id="bookmark-pills"></div>
    <button id="btn-add-bookmark" title="Add bookmark for current page">+</button>
  </div>

  <div id="bookmark-edit-modal" class="hidden">
    <div id="bookmark-modal-backdrop"></div>
    <div id="bookmark-modal-content">
      <h2>Edit Bookmark</h2>
      <input type="text" id="bookmark-modal-label" placeholder="Bookmark label">
      <label id="bookmark-segue-label">
        <input type="checkbox" id="bookmark-modal-segue">
        Mark as segue
      </label>
      <button id="bookmark-modal-delete" class="destructive">Delete</button>
      <div id="bookmark-modal-buttons">
        <button id="bookmark-modal-cancel">Cancel</button>
        <button id="bookmark-modal-done">Done</button>
      </div>
    </div>
  </div>

  <div id="nav-bar">
    <button id="btn-sepia" title="Sepia tone">🟫</button>
    <button id="btn-invert" title="Invert colors">⚫</button>
    <button id="btn-sharpen" title="Sharpen (for scanned pages)">✨</button>
    <button id="btn-toggle-bookmarks" title="Bookmarks">🔖</button>
    <div id="nav-divider"></div>
    <button id="btn-first" title="First page">⏮</button>
    <button id="btn-prev" title="Previous page">◀  Prev</button>
    <input type="range" id="page-slider" min="0" max="1" value="0">
    <span id="nav-label"></span>
    <button id="btn-next" title="Next page">Next  ▶</button>
    <button id="btn-last" title="Last page">⏭</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
